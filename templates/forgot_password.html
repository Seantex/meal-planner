<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwort vergessen – Meal Planner</title>
  <style>html,body{background:#000005;color:#f0f0fa;}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=51">
</head>
<body>
  <div class="bg-aurora" aria-hidden="true"><div class="bg-aurora-3"></div></div>
  <div id="cursor-spotlight" aria-hidden="true"></div>
  <script src="{{ url_for('static', filename='js/main.js') }}?v=21" defer></script>

  <div class="auth-wrap">
    <div class="auth-brand">
      <span class="auth-brand-icon">🍽️</span>
      <h1 class="auth-brand-name">Meal Planner</h1>
      <p class="auth-brand-sub">Passwort zurücksetzen</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="alert alert--{{ 'success' if cat == 'success' else 'error' if cat == 'error' else 'info' }}"
             style="margin-bottom:12px;max-width:400px;width:100%;">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <div class="auth-card">
      <h2 class="auth-card-heading">Passwort vergessen?</h2>
      <p class="auth-card-sub">Wir schicken dir einen Reset-Link per E-Mail</p>
      <form method="POST">
        <div class="form-group">
          <label class="form-label">E-Mail-Adresse</label>
          <input type="email" name="email" class="form-control"
                 placeholder="deine@email.at" required autofocus>
        </div>
        <button type="submit" class="btn btn--primary btn--big" style="width:100%;margin-top:4px;">
          Reset-Link senden →
        </button>
      </form>
      <div class="auth-divider"><span>oder</span></div>
      <a href="{{ url_for('login') }}" class="btn btn--outline btn--big" style="width:100%;justify-content:center;">
        ← Zurück zum Login
      </a>
    </div>
  </div>
</body>
</html>
