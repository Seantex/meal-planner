<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwort vergessen – Meal Planner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=11">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <span style="font-size:2.5rem;">🍽️</span>
      <h1 class="auth-title">Passwort vergessen</h1>
      <p class="auth-subtitle">Wir schicken dir einen Reset-Link per E-Mail</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="alert alert--{{ 'success' if cat == 'success' else 'error' if cat == 'error' else 'info' }}" style="margin-bottom:16px;">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
    <div class="auth-card">
      <h2 class="auth-card-title">Passwort zurücksetzen</h2>
      <form method="POST">
        <div class="form-group">
          <label class="form-label">E-Mail-Adresse</label>
          <input type="email" name="email" class="form-control" placeholder="deine@email.at" required autofocus>
        </div>
        <button type="submit" class="btn btn--primary btn--big" style="width:100%; margin-top:8px;">
          Reset-Link senden
        </button>
      </form>
      <div class="auth-divider">oder</div>
      <a href="{{ url_for('login') }}" class="btn btn--outline btn--big" style="width:100%; text-align:center; display:block;">
        Zurück zum Login
      </a>
    </div>
  </div>
</body>
</html>
