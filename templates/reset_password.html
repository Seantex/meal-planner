<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neues Passwort – Meal Planner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=11">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <span style="font-size:2.5rem;">🍽️</span>
      <h1 class="auth-title">Neues Passwort</h1>
      <p class="auth-subtitle">Gib dein neues Passwort ein</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="alert alert--{{ 'success' if cat == 'success' else 'error' if cat == 'error' else 'info' }}" style="margin-bottom:16px;">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
    <div class="auth-card">
      <h2 class="auth-card-title">Passwort ändern</h2>
      <form method="POST">
        <input type="hidden" name="token" value="{{ token }}">
        <div class="form-group">
          <label class="form-label">Neues Passwort <span style="color:var(--c-text-muted); font-weight:400;">(min. 6 Zeichen)</span></label>
          <input type="password" name="password" class="form-control" placeholder="Neues Passwort" required minlength="6" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Passwort wiederholen</label>
          <input type="password" name="password2" class="form-control" placeholder="Passwort bestätigen" required>
        </div>
        <button type="submit" class="btn btn--primary btn--big" style="width:100%; margin-top:8px;">
          Passwort speichern
        </button>
      </form>
    </div>
  </div>
</body>
</html>
