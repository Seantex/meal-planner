name: Keep Render Server Alive

on:
  schedule:
    # Zwei versetzte Zeitpläne → effektiv alle 5 Minuten
    - cron: '*/10 * * * *'        # :00, :10, :20, :30, :40, :50
    - cron: '5-59/10 * * * *'     # :05, :15, :25, :35, :45, :55
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render server
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
              "https://meal-planner-fjih.onrender.com/health" 2>/dev/null || echo "000")
            echo "Versuch $i: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Server wach!"
              exit 0
            fi
            sleep 20
          done
          echo "Server antwortet nach 5 Versuchen nicht – wird weiter versucht beim nächsten Ping"
          exit 0
