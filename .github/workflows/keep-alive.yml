name: Keep Render Server Alive

on:
  schedule:
    # Alle 14 Minuten pingen (Render schläft nach 15min ein)
    - cron: '*/14 * * * *'
  workflow_dispatch:  # Manuell auslösbar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (with retry)
        run: |
          echo "Pinging meal-planner server..."
          # Render cold-start kann 60-90 Sekunden dauern → 100s Timeout + 3 Versuche
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 100 \
              "https://meal-planner-fjih.onrender.com/health" || echo "000")
            echo "Versuch $i: HTTP Status $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Server ist wach und gesund!"
              exit 0
            fi
            echo "Warte 10 Sekunden vor nächstem Versuch..."
            sleep 10
          done
          echo "Server antwortet nicht (möglicherweise Deployment läuft)"
          exit 0
